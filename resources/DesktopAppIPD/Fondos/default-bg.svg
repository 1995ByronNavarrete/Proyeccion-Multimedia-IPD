<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816"/>
      <stop offset="25%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#0d0d35"/>
      <stop offset="75%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#050816"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="25%" r="60%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="75%" r="55%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#6c5ce7;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="75%" style="stop-color:#00d4ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>

  <!-- Stars/particles -->
  <g opacity="0.3">
    <circle cx="150" cy="120" r="1.5" fill="#6c5ce7"/>
    <circle cx="1780" cy="200" r="1.2" fill="#00d4ff"/>
    <circle cx="400" cy="900" r="1.5" fill="#a855f7"/>
    <circle cx="1600" cy="850" r="1.8" fill="#6c5ce7"/>
    <circle cx="850" cy="80" r="1.2" fill="#00d4ff"/>
    <circle cx="1050" cy="1000" r="1.3" fill="#a855f7"/>
    <circle cx="250" cy="500" r="1" fill="#6c5ce7"/>
    <circle cx="1680" cy="450" r="1" fill="#00d4ff"/>
    <circle cx="600" cy="200" r="0.8" fill="#ffffff" opacity="0.2"/>
    <circle cx="1300" cy="300" r="0.8" fill="#ffffff" opacity="0.2"/>
    <circle cx="750" cy="700" r="1" fill="#ffffff" opacity="0.15"/>
    <circle cx="1200" cy="650" r="0.7" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- Subtle cross shape (decorative) -->
  <g opacity="0.04" transform="translate(960, 380)">
    <rect x="-2" y="-40" width="4" height="80" rx="2" fill="#ffffff"/>
    <rect x="-30" y="-2" width="60" height="4" rx="2" fill="#ffffff"/>
  </g>

  <!-- Accent line top -->
  <rect x="660" y="280" width="600" height="1.5" fill="url(#accentLine)"/>

  <!-- Icon: Radio/church symbol -->
  <text x="960" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6c5ce7" text-anchor="middle" opacity="0.6" filter="url(#glow)">✦</text>

  <!-- Title -->
  <text x="960" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3" opacity="0.95">Proyección Multimedia</text>
  <text x="960" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#6c5ce7" text-anchor="middle" letter-spacing="6" opacity="0.7">IPD - PARA IGLESIAS</text>

  <!-- Divider -->
  <rect x="860" y="520" width="200" height="1.5" fill="url(#accentLine)"/>

  <!-- Welcome verse -->
  <text x="960" y="610" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#c084fc" text-anchor="middle" font-style="italic" opacity="0.95">"Este es el día que hizo Jehová;</text>
  <text x="960" y="652" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#c084fc" text-anchor="middle" font-style="italic" opacity="0.95">nos gozaremos y alegraremos en él."</text>
  <text x="960" y="695" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6c5ce7" text-anchor="middle" opacity="0.6">— Salmos 118:24 (RVR1960)</text>

  <!-- Accent line bottom -->
  <rect x="710" y="740" width="500" height="1" fill="url(#accentLine)" opacity="0.3"/>

  <!-- Status message -->
  <text x="960" y="810" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4b5563" text-anchor="middle" letter-spacing="3" opacity="0.5">SISTEMA LISTO · PROYECTA UN VERSÍCULO PARA COMENZAR</text>

  <!-- Footer -->
  <text x="960" y="1000" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle" opacity="0.4">Proyección Multimedia IPD v1.5.3</text>
</svg>
