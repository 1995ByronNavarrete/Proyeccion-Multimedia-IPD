<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816"/>
      <stop offset="30%" style="stop-color:#0a0a2e"/>
      <stop offset="60%" style="stop-color:#12122a"/>
      <stop offset="100%" style="stop-color:#050816"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="30%" r="55%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>

  <text x="960" y="500" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#c084fc" text-anchor="middle" font-style="italic" opacity="0.95">"Este es el día que hizo Jehová;</text>
  <text x="960" y="555" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#c084fc" text-anchor="middle" font-style="italic" opacity="0.95">nos gozaremos y alegraremos en él."</text>
  <text x="960" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6c5ce7" text-anchor="middle" opacity="0.5">— Salmos 118:24 (RVR1960)</text>
</svg>
